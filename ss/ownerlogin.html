<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Owner Login</title><link rel="stylesheet" href="style.css"></head>
<body>
  <div class="center-card">
    <div class="brand">🐶 Pet Owner Login</div>
    <form onsubmit="event.preventDefault(); location.href='ownerdashboard.html'">
      <input class="input" placeholder="Username" required>
      <input class="input" type="password" placeholder="Password" required>
      <div style="display:flex;gap:10px;margin-top:10px">
        <button class="btn btn-primary" type="submit">Login</button>
        <a class="btn btn-soft" href="index.html">Back</a>
      </div>
    </form>
  </div>
</body>
</html>
